services:
  - type: web
    name: xeno-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WORKER_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"

  - type: web
    name: xeno-worker
    runtime: node
    rootDir: apps/worker
    buildCommand: bun install
    startCommand: bun run start
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: API_BASE_URL
        sync: false
